name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check agent_memory/ tests/ scripts/

      - name: Security audit
        run: |
          pip install pip-audit
          # nltk 3.9.3 is latest available; CVEs have no fix version yet (transitive dep of zeyrek)
          pip-audit --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln CVE-2026-33230 --ignore-vuln CVE-2026-33231

      - name: Run tests
        env:
          OPENROUTER_API_KEY: test-key-for-ci
        run: python -m pytest tests/ -v --tb=short
